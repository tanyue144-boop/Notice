[build]
  command = "mkdir -p public public/notice netlify/functions && cp index.html public/index.html && cp notice.html public/notice/index.html && cp notice.html public/notice.html && cp orders.mjs netlify/functions/orders.mjs && cp notice.mjs netlify/functions/notice.mjs"
  publish = "public"
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"

[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
